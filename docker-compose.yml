  #     - elasticsearch
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5

volumes:
  mongodb_data:
  elasticsearch_data:
